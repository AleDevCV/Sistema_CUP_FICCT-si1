name: Build and deploy PHP app to Azure Web App - sistema-cup-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ─────────────────────────────────────────────────
      # Node.js (IMPRESCINDIBLE para Vite)
      # ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias npm
        run: npm ci

      - name: Compilar assets con Vite
        run: npm run build
      # ─────────────────────────────────────────────────

      # ─────────────────────────────────────────────────
      # PHP / Composer
      # ─────────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_pgsql, bcmath, ctype, fileinfo, json, tokenizer, xml

      - name: Validar composer.json
        id: composer-check
        run: |
          if [ -f "composer.json" ]; then
            echo "CI=true" >> $GITHUB_OUTPUT
          fi

      - name: Composer install
        run: composer install --no-dev --optimize-autoloader
      # ─────────────────────────────────────────────────

      # ─────────────────────────────────────────────────
      # Empaquetar artefacto
      # ─────────────────────────────────────────────────
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: |
            .
            !node_modules/
            !.git/

  # ───────────────────────────────────────────────────
  # Deploy a Azure
  # ───────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sistema-cup-api'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
